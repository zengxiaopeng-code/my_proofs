name: Docs (docgen)

# 生成可浏览的 Lean API 文档。docgen 需为整个导入闭包建文档，很慢（~2h），
# 所以【只手动触发】——想更新文档站时在 Actions 页点 “Run workflow”。
# 日常推送的验证在 lean_action_ci.yml，与此互不影响。
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # 先腾磁盘，否则 docgen 会撑爆 runner（No space left on device）。
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false

      # docgen 需要项目已构建，这里先构建一次。
      - uses: leanprover/lean-action@v1

      # 生成可浏览的 Lean API 文档（docgen）。
      - uses: leanprover-community/docgen-action@v1
