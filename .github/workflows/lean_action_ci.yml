name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # 行内规矩①：禁止 `import Mathlib`，强制精确导入（模仿 PFR/FLT）。
      # 有任何文件写了裸的 `import Mathlib` 就让 CI 失败。
      - name: Don't 'import Mathlib', use precise imports
        run: |
          ! (find MyProofs -name "*.lean" -type f -print0 | xargs -0 grep -E -n '^import Mathlib$')

      # 行内规矩②：先腾磁盘，否则 docgen 会撑爆 runner（No space left on device）。
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false

      # 编译并逐条核验所有证明（这一步就是"背书"）。
      - uses: leanprover/lean-action@v1

      # 生成可浏览的 Lean API 文档（docgen）。有了①②才跑得动。
      - uses: leanprover-community/docgen-action@v1
