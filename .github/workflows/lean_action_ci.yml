name: Lean Action CI

# 每次推送/PR 都跑：只做“验证证明”这一件事，几分钟绿灯。
# 文档生成（docgen，~2h）已拆到单独的手动 workflow：docs.yml。
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # 行内规矩：禁止 `import Mathlib`，强制精确导入（模仿 PFR/FLT）。
      # 有任何文件写了裸的 `import Mathlib` 就让 CI 失败。
      - name: Don't 'import Mathlib', use precise imports
        run: |
          ! (find MyProofs -name "*.lean" -type f -print0 | xargs -0 grep -E -n '^import Mathlib$')

      # 编译并逐条核验所有证明（这一步就是“背书”）。
      - uses: leanprover/lean-action@v1
